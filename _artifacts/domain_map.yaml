tensions:
  - name: 'Public-key-only setup vs private-key-required operations'
    skills: ['client-setup', 'transactions', 'payment-sources', 'payment-links']
    description: 'WompiClient works with only a publicKey, but many operations require privateKey. Setting up without it produces a working but silently incomplete client.'
    implication: 'Agent generates a client with only publicKey, then all private operations silently return errors.'

  - name: 'Error-first tuple vs familiar promise rejection'
    skills: ['client-setup', 'transactions', 'payment-sources', 'payment-links']
    description: 'The SDK never throws on API errors — it returns [error, null]. Agents trained on promise-throwing libraries omit error checks.'
    implication: 'Agent wraps calls in try/catch (catches nothing for API errors) or ignores error slot.'

  - name: 'Sandbox convenience vs production key discipline'
    skills: ['client-setup', 'go-to-production']
    description: 'sandbox defaults to false (production), but developers iterate in sandbox. Omitting the flag hits production.'
    implication: 'Agent hardcodes sandbox: true (breaking production) or omits it (hitting production during dev).'

  - name: 'Signature amount must match transaction amount exactly'
    skills: ['transactions', 'go-to-production']
    description: 'getSignatureKey hashes amountInCents as-is. Any transformation between signing and creating the transaction produces a mismatched signature.'
    implication: 'Agent computes signature early then adjusts amount, producing a rejected transaction.'

