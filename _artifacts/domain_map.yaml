library:
  name: '@pulgueta/wompi'
  version: '2.0.0'
  repository: 'https://github.com/pulgueta/wompi-node'
  description: 'Unofficial Node.js SDK for the Wompi payment gateway (Colombia). Wraps the Wompi REST API with full TypeScript types, Zod-validated inputs/outputs, and an error-first tuple pattern.'
  primary_framework: 'framework-agnostic'

domains:
  - name: 'Processing payments'
    slug: 'payment-processing'
    description: 'Everything a developer touches when building a checkout flow: client initialization, key management, the multi-step transaction sequence (acceptance token → tokenize → sign → create), error handling, and going live.'

  - name: 'Managing payment instruments'
    slug: 'payment-instruments'
    description: 'Saved payment sources for recurring billing and hosted payment links for no-code checkout pages.'

skills:
  - name: 'Client Setup'
    slug: 'client-setup'
    domain: 'payment-processing'
    description: 'Initialize WompiClient with the correct keys, configure sandbox vs production, and understand the error-first Result tuple pattern that every method returns.'
    type: 'core'
    packages:
      - '@pulgueta/wompi'
    covers:
      - 'WompiClient constructor'
      - 'WompiClientOptions (publicKey, privateKey, sandbox)'
      - 'Result<T> tuple — [error, data]'
      - 'WompiErrorResult union type'
      - 'Subpath exports (@pulgueta/wompi, /client, /server, /errors, /types, /schemas)'
      - 'WompiRequest base class'
      - 'timeoutMs configuration'
    tasks:
      - 'Install the SDK and its zod peer dependency'
      - 'Create a WompiClient instance with public and private keys'
      - 'Switch between sandbox and production environments'
      - 'Destructure and check the [error, data] tuple from any method'
      - 'Import WompiClient from the correct subpath'
    failure_modes:
      - mistake: 'Calling private-key methods without providing privateKey'
        mechanism: 'Methods like listTransactions, voidTransaction, paymentSources.*, paymentLinks.create/update return [WompiError, null] immediately when privateKey is undefined — there is no runtime crash, so missing output is the only signal.'
        wrong_pattern: |
          const wompi = new WompiClient({ publicKey: process.env.WOMPI_PUBLIC_KEY! });
          const [error, data] = await wompi.transactions.listTransactions();
          // error.message === "Private key is required for this operation"
        correct_pattern: |
          const wompi = new WompiClient({
            publicKey: process.env.WOMPI_PUBLIC_KEY!,
            privateKey: process.env.WOMPI_PRIVATE_KEY!,
          });
        source: 'packages/core/src/client/transactions/index.ts, README'
        priority: 'HIGH'
        status: 'active'
        skills: ['client-setup', 'transactions', 'payment-sources', 'payment-links']

      - mistake: 'sandbox defaults to false — production is the default'
        mechanism: 'Omitting sandbox hits https://production.wompi.co. Sandbox keys used against production return auth errors; production keys used against sandbox process real money.'
        wrong_pattern: |
          const wompi = new WompiClient({ publicKey: process.env.WOMPI_PUBLIC_KEY! });
        correct_pattern: |
          const wompi = new WompiClient({
            publicKey: process.env.WOMPI_PUBLIC_KEY!,
            sandbox: process.env.NODE_ENV !== 'production',
          });
        source: 'packages/core/src/request.ts, README'
        priority: 'HIGH'
        status: 'active'
        skills: ['client-setup', 'go-to-production']

      - mistake: 'Not checking the error tuple — assuming data is always present'
        mechanism: 'Every method returns [error, data]. When error is non-null, data is null. Code that reads data without checking error first will throw a null-dereference.'
        wrong_pattern: |
          const [, data] = await wompi.transactions.getTransaction("txn-123");
          console.log(data.data.status); // TypeError if error occurred
        correct_pattern: |
          const [error, data] = await wompi.transactions.getTransaction("txn-123");
          if (error) { console.error(error.message); return; }
          console.log(data.data.status);
        source: 'packages/core/src/types.ts, README'
        priority: 'HIGH'
        status: 'active'
        skills: ['client-setup', 'transactions', 'payment-sources', 'payment-links']

  - name: 'Transactions'
    slug: 'transactions'
    domain: 'payment-processing'
    description: 'The full payment lifecycle: fetch an acceptance token from the merchant, tokenize a card or Nequi account, compute the integrity signature, and create the transaction. Also covers reading, listing, filtering, and voiding transactions, plus PSE bank institution lookup.'
    type: 'core'
    packages:
      - '@pulgueta/wompi'
    covers:
      - 'merchants.getMerchant()'
      - 'tokens.tokenizeCard(input)'
      - 'tokens.tokenizeNequi(input)'
      - 'tokens.getNequiToken(id)'
      - 'getSignatureKey({ reference, amountInCents, integrityKey, currency?, expirationTime? })'
      - 'transactions.createTransaction(input)'
      - 'transactions.getTransaction(id)'
      - 'transactions.listTransactions(params)'
      - 'transactions.voidTransaction(id, input?)'
      - 'pse.getFinancialInstitutions()'
      - 'TransactionListParams'
      - 'TransactionStatus enum'
      - 'VoidTransactionResult shape'
    tasks:
      - 'Create a card payment end-to-end'
      - 'Create a Nequi payment'
      - 'Create a PSE bank-transfer payment'
      - 'Retrieve a single transaction by ID'
      - 'List and filter transactions'
      - 'Void an approved CARD transaction'
      - 'Compute the integrity signature'
    failure_modes:
      - mistake: 'Multiplying amountInCents by 100 before passing to getSignatureKey'
        mechanism: 'In v1 the SDK multiplied the amount internally (a bug). In v2 amountInCents is hashed exactly as given. Multiplying again produces a signature Wompi rejects.'
        wrong_pattern: |
          const signature = await getSignatureKey({
            reference,
            amountInCents: priceInPesos * 100,
            integrityKey: process.env.WOMPI_INTEGRITY_KEY!,
          });
        correct_pattern: |
          const amountInCents = 2_490_000;
          const signature = await getSignatureKey({ reference, amountInCents, integrityKey });
        source: 'CHANGELOG v2.0.0, packages/core/test/server-utils.test.ts'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Fixed in v2.0.0 but agents trained on v1 code will reproduce the * 100 multiplication.'
        skills: ['transactions']

      - mistake: 'Using positional arguments with getSignatureKey (v1 API)'
        mechanism: 'v2 changed getSignatureKey from positional args to a named-options object.'
        wrong_pattern: |
          const signature = await getSignatureKey(reference, amountInCents, integrityKey);
        correct_pattern: |
          const signature = await getSignatureKey({ reference, amountInCents, integrityKey });
        source: 'CHANGELOG v2.0.0'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Breaking change in v2.0.0.'
        skills: ['transactions']

      - mistake: 'Caching the acceptance token across multiple transactions'
        mechanism: 'The acceptance_token is short-lived. Reusing it causes Wompi to reject the transaction.'
        source: 'README, packages/core/src/client/merchants/index.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['transactions']

      - mistake: 'expirationTime in signature does not match expiration_time in transaction'
        mechanism: 'Wompi hashes expirationTime into the signature only when present. Mismatch causes signature rejection.'
        source: 'packages/core/src/server/utils/get-signature-key.ts'
        priority: 'HIGH'
        status: 'active'
        skills: ['transactions']

      - mistake: 'Reading voidTransaction result from data instead of data.transaction'
        mechanism: 'voidTransaction wraps the outcome: data.status is the void result, data.transaction is the voided transaction. Breaking change in v2.0.0.'
        source: 'CHANGELOG v2.0.0, packages/core/test/transactions.test.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Breaking change in v2.0.0.'
        skills: ['transactions']

      - mistake: 'Providing both payment_method and payment_source_id'
        mechanism: 'A Zod .refine() enforces exactly one. Returns [WompiError, null] before HTTP call.'
        source: 'packages/core/src/schemas.ts'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['transactions']

      - mistake: 'Wrong date format for listTransactions filters'
        mechanism: 'from_date and until_date require YYYY-MM-DD. ISO timestamps fail validation.'
        source: 'packages/core/src/schemas.ts'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['transactions']

